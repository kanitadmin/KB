<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f7f9fb"/>
  <rect x="55" y="45" width="1090" height="585" rx="18" fill="#ffffff" stroke="#c9d3df" stroke-width="2"/>
  <text x="90" y="105" font-family="Segoe UI, Tahoma, sans-serif" font-size="34" font-weight="700" fill="#18324a">ขั้นตอนที่ 6: ทดสอบกับ Pilot User และ Pilot Computer</text>
  <text x="90" y="150" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#4f6478">ใช้กลุ่มตัวอย่างที่ควบคุมได้ ก่อนขยายผลไปยังหน่วยงานจริง</text>
  <rect x="165" y="220" width="250" height="150" rx="12" fill="#e8f2ff" stroke="#3478c6" stroke-width="2"/>
  <text x="290" y="280" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Pilot Users</text>
  <text x="290" y="318" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">แพทย์ พยาบาล Back Office</text>
  <rect x="475" y="220" width="250" height="150" rx="12" fill="#eef8ef" stroke="#3d8b52" stroke-width="2"/>
  <text x="600" y="280" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Pilot Computers</text>
  <text x="600" y="318" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">เครื่องทดสอบแต่ละพื้นที่</text>
  <rect x="785" y="220" width="250" height="150" rx="12" fill="#fff4df" stroke="#cf8a1e" stroke-width="2"/>
  <text x="910" y="280" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Test Scope</text>
  <text x="910" y="318" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">Login, App, Printer, Share</text>
  <rect x="205" y="470" width="790" height="82" rx="10" fill="#f1f5f9" stroke="#d5dde6"/>
  <text x="600" y="520" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#18324a">ผลลัพธ์: ยืนยันว่า GPO ไม่กระทบ Workflow สำคัญของโรงพยาบาล</text>
</svg>
