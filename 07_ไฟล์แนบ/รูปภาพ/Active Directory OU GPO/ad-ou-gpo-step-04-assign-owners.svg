<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f7f9fb"/>
  <rect x="55" y="45" width="1090" height="585" rx="18" fill="#ffffff" stroke="#c9d3df" stroke-width="2"/>
  <text x="90" y="105" font-family="Segoe UI, Tahoma, sans-serif" font-size="34" font-weight="700" fill="#18324a">ขั้นตอนที่ 4: กำหนด Owner ของกลุ่มและ Service Account</text>
  <text x="90" y="150" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#4f6478">ทุกสิทธิ์ต้องมีเจ้าของ ผู้อนุมัติ และรอบทบทวนที่ตรวจสอบได้</text>
  <rect x="125" y="235" width="265" height="150" rx="12" fill="#e8f2ff" stroke="#3478c6" stroke-width="2"/>
  <text x="258" y="295" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Group Owner</text>
  <text x="258" y="332" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">เจ้าของสิทธิ์และข้อมูล</text>
  <rect x="468" y="235" width="265" height="150" rx="12" fill="#eef8ef" stroke="#3d8b52" stroke-width="2"/>
  <text x="600" y="295" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Service Owner</text>
  <text x="600" y="332" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">เจ้าของระบบที่ใช้บัญชี</text>
  <rect x="810" y="235" width="265" height="150" rx="12" fill="#fff4df" stroke="#cf8a1e" stroke-width="2"/>
  <text x="943" y="295" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Review Date</text>
  <text x="943" y="332" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">กำหนดรอบทบทวน</text>
  <rect x="180" y="475" width="840" height="80" rx="10" fill="#f1f5f9" stroke="#d5dde6"/>
  <text x="600" y="524" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#18324a">ผลลัพธ์: สิทธิ์ทุกชุดมีผู้รับผิดชอบและพร้อมตรวจสอบย้อนหลัง</text>
</svg>
