<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f7f9fb"/>
  <rect x="55" y="45" width="1090" height="585" rx="18" fill="#ffffff" stroke="#c9d3df" stroke-width="2"/>
  <text x="90" y="105" font-family="Segoe UI, Tahoma, sans-serif" font-size="34" font-weight="700" fill="#18324a">ขั้นตอนที่ 1: สำรองและ Export โครงสร้างปัจจุบัน</text>
  <text x="90" y="150" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#4f6478">เก็บหลักฐานก่อนเปลี่ยนแปลง Active Directory และ GPO เพื่อใช้ตรวจสอบและ Rollback</text>
  <rect x="105" y="235" width="250" height="135" rx="12" fill="#e8f2ff" stroke="#3478c6" stroke-width="2"/>
  <text x="230" y="295" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">AD Current State</text>
  <text x="230" y="330" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">OU, Users, Groups</text>
  <path d="M365 303 H485" stroke="#607d96" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="500" y="235" width="250" height="135" rx="12" fill="#eef8ef" stroke="#3d8b52" stroke-width="2"/>
  <text x="625" y="295" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">GPO Backup</text>
  <text x="625" y="330" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">Policy, Link, Filter</text>
  <path d="M760 303 H880" stroke="#607d96" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="895" y="235" width="250" height="135" rx="12" fill="#fff4df" stroke="#cf8a1e" stroke-width="2"/>
  <text x="1020" y="295" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Evidence Folder</text>
  <text x="1020" y="330" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">ไฟล์สำรองและรายงาน</text>
  <rect x="145" y="455" width="910" height="86" rx="10" fill="#f1f5f9" stroke="#d5dde6"/>
  <text x="600" y="507" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#18324a">ผลลัพธ์: มีข้อมูลอ้างอิงก่อนดำเนินการและพร้อมกู้คืนเมื่อเกิดปัญหา</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#607d96"/>
    </marker>
  </defs>
</svg>
