<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f7f9fb"/>
  <rect x="55" y="45" width="1090" height="585" rx="18" fill="#ffffff" stroke="#c9d3df" stroke-width="2"/>
  <text x="90" y="105" font-family="Segoe UI, Tahoma, sans-serif" font-size="34" font-weight="700" fill="#18324a">ขั้นตอนที่ 7: ตรวจสอบผลด้วยเครื่องมือและการใช้งานจริง</text>
  <text x="90" y="150" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#4f6478">ตรวจผล GPO, Event Log และ Application สำคัญก่อนอนุมัติ Deploy</text>
  <rect x="130" y="235" width="260" height="140" rx="12" fill="#e8f2ff" stroke="#3478c6" stroke-width="2"/>
  <text x="260" y="292" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">gpresult / rsop</text>
  <text x="260" y="330" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">ยืนยัน Policy ที่ได้รับ</text>
  <rect x="470" y="235" width="260" height="140" rx="12" fill="#eef8ef" stroke="#3d8b52" stroke-width="2"/>
  <text x="600" y="292" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Event Log</text>
  <text x="600" y="330" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">ตรวจ Warning และ Error</text>
  <rect x="810" y="235" width="260" height="140" rx="12" fill="#fff4df" stroke="#cf8a1e" stroke-width="2"/>
  <text x="940" y="292" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Application Test</text>
  <text x="940" y="330" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">HIS, LIS, PACS, Share</text>
  <rect x="170" y="475" width="860" height="80" rx="10" fill="#f1f5f9" stroke="#d5dde6"/>
  <text x="600" y="524" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#18324a">ผลลัพธ์: มีหลักฐานว่าการตั้งค่าสำเร็จและระบบงานยังใช้งานได้</text>
</svg>
