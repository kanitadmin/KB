<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f7f9fb"/>
  <rect x="55" y="45" width="1090" height="585" rx="18" fill="#ffffff" stroke="#c9d3df" stroke-width="2"/>
  <text x="90" y="105" font-family="Segoe UI, Tahoma, sans-serif" font-size="34" font-weight="700" fill="#18324a">ขั้นตอนที่ 8: Deploy ทีละกลุ่มงาน</text>
  <text x="90" y="150" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#4f6478">เริ่มจากพื้นที่ความเสี่ยงต่ำ แล้วค่อยขยายไปยังพื้นที่คลินิกที่มีผลต่อการรักษา</text>
  <rect x="120" y="250" width="210" height="120" rx="12" fill="#eef8ef" stroke="#3d8b52" stroke-width="2"/>
  <text x="225" y="300" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Wave 1</text>
  <text x="225" y="335" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">Back Office</text>
  <path d="M340 310 H445" stroke="#607d96" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="460" y="250" width="210" height="120" rx="12" fill="#e8f2ff" stroke="#3478c6" stroke-width="2"/>
  <text x="565" y="300" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Wave 2</text>
  <text x="565" y="335" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">OPD / Support</text>
  <path d="M680 310 H785" stroke="#607d96" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="800" y="250" width="250" height="120" rx="12" fill="#fff4df" stroke="#cf8a1e" stroke-width="2"/>
  <text x="925" y="300" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700" fill="#18324a">Wave 3</text>
  <text x="925" y="335" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" fill="#4f6478">ER / IPD / Critical</text>
  <rect x="190" y="480" width="820" height="80" rx="10" fill="#f1f5f9" stroke="#d5dde6"/>
  <text x="600" y="529" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#18324a">ผลลัพธ์: ลดความเสี่ยงจากการเปลี่ยนแปลงวงกว้างในครั้งเดียว</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#607d96"/>
    </marker>
  </defs>
</svg>
