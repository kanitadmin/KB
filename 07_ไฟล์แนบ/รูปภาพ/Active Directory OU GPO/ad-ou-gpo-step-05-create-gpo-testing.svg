<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f7f9fb"/>
  <rect x="55" y="45" width="1090" height="585" rx="18" fill="#ffffff" stroke="#c9d3df" stroke-width="2"/>
  <text x="90" y="105" font-family="Segoe UI, Tahoma, sans-serif" font-size="34" font-weight="700" fill="#18324a">ขั้นตอนที่ 5: สร้าง GPO ใน OU ทดสอบ</text>
  <text x="90" y="150" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#4f6478">เริ่มจาก Baseline และทดสอบผลกระทบก่อนผูกกับ OU ใช้งานจริง</text>
  <rect x="120" y="225" width="250" height="145" rx="12" fill="#e8f2ff" stroke="#3478c6" stroke-width="2"/>
  <text x="245" y="282" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="23" font-weight="700" fill="#18324a">Security Baseline</text>
  <text x="245" y="320" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="17" fill="#4f6478">Microsoft Baseline</text>
  <path d="M380 298 H475" stroke="#607d96" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="490" y="225" width="250" height="145" rx="12" fill="#eef8ef" stroke="#3d8b52" stroke-width="2"/>
  <text x="615" y="282" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="23" font-weight="700" fill="#18324a">GPO Draft</text>
  <text x="615" y="320" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="17" fill="#4f6478">ตั้งค่าและบันทึก Owner</text>
  <path d="M750 298 H845" stroke="#607d96" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="860" y="225" width="250" height="145" rx="12" fill="#fff4df" stroke="#cf8a1e" stroke-width="2"/>
  <text x="985" y="282" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="23" font-weight="700" fill="#18324a">08_Testing</text>
  <text x="985" y="320" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="17" fill="#4f6478">ผูกกับ OU ทดสอบ</text>
  <rect x="190" y="475" width="820" height="80" rx="10" fill="#f1f5f9" stroke="#d5dde6"/>
  <text x="600" y="524" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="22" fill="#18324a">ผลลัพธ์: GPO พร้อมทดสอบ โดยยังไม่กระทบผู้ใช้งานจริง</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#607d96"/>
    </marker>
  </defs>
</svg>
