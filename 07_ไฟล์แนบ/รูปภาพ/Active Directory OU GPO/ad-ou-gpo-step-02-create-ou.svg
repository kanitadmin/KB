  <g id="labels"><text x="90" y="91" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="18" font-weight="700" fill="#2F6FB7" letter-spacing="1">ACTIVE DIRECTORY / GPO ROADMAP</text><text x="90" y="136" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="34" font-weight="800" fill="#17263A">ขั้นตอนที่ 2: สร้าง OU หลักและ OU ย่อย</text><text x="90" y="176" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="20" fill="#5E6B7A">จัดพื้นที่บริหารแยกตามบทบาท ผู้ใช้ เครื่อง Server และพื้นที่ทดสอบ</text><text x="1040" y="106" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="12" font-weight="700" fill="#2F6FB7" letter-spacing="1">STEP</text><text x="1040" y="142" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="34" font-weight="800" fill="#17263A">2</text><text x="163" y="314" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">1</text><text x="260.0" y="332" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="21" font-weight="800" fill="#17263A">Domain Root</text><text x="260.0" y="362" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="16" fill="#5E6B7A">hospital.local</text><text x="503" y="314" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">2</text><text x="600.0" y="332" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="21" font-weight="800" fill="#17263A">Core OUs</text><text x="600.0" y="362" text-anchor="middle" font-family="Segoe UI, Leelawadee UI, Tahoma, Arial, sans-serif" font-size="16" fill="#5E6B7A">Admin, Users, Groups</text><text x="843" y="314" text-anchor="middle" font-family="Segoe UI, Leel